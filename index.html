<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#E9ECEF">
<title>Ledger — บันทึกลดน้ำหนัก</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap');

:root{
  --bg:#E9ECEF;
  --panel:#212C36;
  --panel-2:#2C3944;
  --border:#455460;
  --text:#FFFFFF;
  --text-dim:#B8C8D2;
  --bg-text:#1A2229;
  --bg-text-dim:#5C6873;
  --credit:#5FC9B8;
  --debit:#EC825D;
  --gold:#EEC158;
  --gold-on-light:#9A6B12;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', 'Noto Sans Thai', sans-serif;
  --body:'Inter', 'Noto Sans Thai', sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0;}
*{-webkit-user-select:none; user-select:none; -webkit-touch-callout:none;}
input, textarea{-webkit-user-select:text; user-select:text;}
::selection{background:rgba(238,193,88,.55); color:#0A0E12;}
::-moz-selection{background:rgba(238,193,88,.55); color:#0A0E12;}
html{background:var(--bg); min-height:100%; overscroll-behavior:none;}
html, body{overflow-x:hidden; max-width:100%;}
body{overscroll-behavior-y:none;}
body{
  background:var(--bg);
  color:var(--bg-text);
  font-family:var(--body);
  min-height:100vh;
  padding-bottom:60px;
}
.wrap{max-width:640px; margin:0 auto; padding:16px; width:100%;}

/* Ticker */
.ticker{
  background:linear-gradient(180deg, var(--panel-2), var(--panel));
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
  color:var(--text);
}
.ticker::before{
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, var(--gold), transparent 60%);
}
.ticker-label{
  font-family:var(--mono); font-size:11px; letter-spacing:.12em;
  color:var(--text-dim); text-transform:uppercase;
}
.ticker-row{display:flex; justify-content:space-between; align-items:baseline; margin-top:6px;}
.ticker-balance{font-family:var(--mono); font-size:36px; font-weight:700; letter-spacing:-.02em;}
.ticker-unit{font-family:var(--mono); font-size:14px; color:var(--text-dim); margin-left:4px;}
.ticker-sub{display:flex; gap:14px 18px; margin-top:10px; font-family:var(--mono); font-size:12px; flex-wrap:wrap;}
.ticker-sub span b{color:var(--text); font-weight:500;}
.pos{color:var(--credit);} .neg{color:var(--debit);}

h2{
  font-family:var(--display); font-weight:600; font-size:15px;
  letter-spacing:.02em; margin:22px 0 10px; color:var(--bg-text);
  display:flex; align-items:center; gap:8px;
}
h2 .idx{font-family:var(--mono); color:var(--gold-on-light); font-size:12px; font-weight:700;}

.card{
  background:var(--panel); border:1px solid var(--border); border-radius:12px;
  padding:14px 16px; margin-bottom:10px; box-shadow:0 2px 8px rgba(0,0,0,.15); color:var(--text);
}
.metrics-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.metric{
  background:var(--panel); border:1px solid var(--border); border-radius:12px;
  padding:12px 14px; box-shadow:0 2px 8px rgba(0,0,0,.15); color:var(--text);
}
.metric .lbl{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em;}
.metric .val{font-family:var(--mono); font-size:20px; font-weight:700; margin-top:4px;}
.metric .sub{font-size:11px; color:var(--text-dim); margin-top:2px;}

.date-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
.date-nav button{
  background:var(--panel-2); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:6px 10px; font-family:var(--mono); font-size:13px; cursor:pointer;
}
.date-nav .curr{font-family:var(--mono); font-size:13px; color:var(--bg-text-dim);}

.entry-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 0; border-bottom:1px solid var(--border);
}
.entry-row:last-child{border-bottom:none;}
.entry-name{font-size:13.5px;}
.entry-meta{font-size:11px; color:var(--text-dim); margin-top:2px;}
.entry-right{display:flex; align-items:center; gap:10px;}
.entry-kcal{font-family:var(--mono); font-size:13.5px; font-weight:500;}
.del-btn{
  background:none; border:none; color:var(--text-dim); font-size:16px; cursor:pointer;
  width:22px; height:22px; line-height:1;
}
.empty{color:var(--text-dim); font-size:13px; padding:10px 0; text-align:center;}

form.inline{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
input, select{
  background:var(--panel-2); border:1px solid var(--border); color:var(--text);
  border-radius:8px; padding:9px 10px; font-family:var(--body); font-size:13.5px;
  flex:1; min-width:0;
}
input::placeholder{color:var(--text-dim);}
.btn{
  background:var(--gold); color:#14100A; border:none; border-radius:8px;
  padding:9px 16px; font-family:var(--display); font-weight:600; font-size:13.5px;
  cursor:pointer; white-space:nowrap;
}
.btn.secondary{background:var(--panel-2); color:var(--text); border:1px solid var(--border);}
.btn.wide{width:100%; margin-top:8px;}

.preset-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.chip{
  background:var(--panel-2); border:1px solid var(--border); color:var(--text);
  border-radius:20px; padding:5px 11px; font-size:11.5px; font-weight:500; cursor:pointer;
}
.chip:hover{border-color:var(--gold);}

#food-suggestions{margin-top:6px;}
.suggest-chip{
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(238,193,88,.12); border:1px solid var(--gold); color:var(--text);
  border-radius:20px; padding:5px 11px; font-size:11.5px; cursor:pointer; margin:4px 6px 0 0;
}
.suggest-chip b{color:var(--gold); font-family:var(--mono); font-weight:600;}
.not-found-box{
  margin-top:8px; font-size:12px; color:var(--text-dim);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  background:var(--panel-2); border:1px solid var(--border); border-radius:10px; padding:8px 12px;
}
.search-link{color:var(--gold); font-weight:600; text-decoration:none; font-family:var(--display); white-space:nowrap;}

.chart-wrap{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; box-shadow:0 2px 8px rgba(0,0,0,.15); color:var(--text);}
.progress-wrap{margin-bottom:14px;}
.progress-label{display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:6px;}
.progress-pct{font-family:var(--mono); color:var(--gold); font-weight:600;}
.progress-track{background:var(--panel-2); border:1px solid var(--border); border-radius:20px; height:10px; overflow:hidden;}
.progress-fill{background:linear-gradient(90deg, var(--credit), var(--gold)); height:100%; border-radius:20px; transition:width .3s ease;}
.progress-sub{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:6px;}
svg{width:100%; height:140px; display:block;}

/* Onboarding */
.onboard{
  max-width:420px; margin:40px auto; background:var(--panel);
  border:1px solid var(--border); border-radius:16px; padding:24px; color:var(--text);
}
.onboard h1{font-family:var(--display); font-size:22px; margin-bottom:4px;}
.onboard p.desc{color:var(--text-dim); font-size:13px; margin-bottom:18px;}
.field{margin-bottom:12px;}
.field label{font-size:12px; color:var(--text-dim); display:block; margin-bottom:5px;}
.field input, .field select{width:100%;}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}
.warn{
  background:#3D2419; border:1.5px solid var(--debit); color:#FFDDC9;
  border-radius:8px; padding:12px 14px; font-size:13px; line-height:1.5; margin-top:10px; font-weight:500;
}
.note{color:var(--text-dim); font-size:12px; margin-top:14px; line-height:1.6;}

.hidden{display:none !important;}
footer.reset{text-align:center; margin-top:30px;}
footer.reset button{background:none; border:none; color:var(--bg-text-dim); font-size:11px; text-decoration:underline; cursor:pointer;}
</style>
</head>
<body>
<div class="wrap" id="app">Loading…</div>

<script>
const dateStr = (d=new Date()) => {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const fmtDate = (s) => {
  const d = new Date(s+'T00:00:00');
  const days=['อา','จ','อ','พ','พฤ','ศ','ส'];
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
};
let today = dateStr();
let viewDate = today;

function checkForNewDay(){
  const nowStr = dateStr();
  if(nowStr !== today){
    const wasOnToday = (viewDate === today); // only auto-advance the view if user was looking at "today"
    today = nowStr;
    if(wasOnToday){
      viewDate = today;
      safeGet('day:'+viewDate).then(d => {
        dayData = d || {food:[], exercise:[]};
        render();
      });
    } else {
      render(); // still refresh so date-nav button states (e.g. "next day" disabled) stay correct
    }
  }
}
document.addEventListener('visibilitychange', () => { if(!document.hidden) checkForNewDay(); });
window.addEventListener('focus', checkForNewDay);
window.addEventListener('pageshow', checkForNewDay);
setInterval(checkForNewDay, 60000); // safety net in case the app is left open and visible overnight
let profile = null;
let dayData = {food:[], exercise:[]};
let weightLog = [];

const FOOD_DB = [
  {n:'กะเพราหมูสับ+ไข่ดาว', k:650},
  {n:'กะเพราไก่+ไข่ดาว', k:600},

  {n:'สลัดโรล', k:200},

  {n:'ข้าวผัด', k:550},

// Build a lookup index once for fast matching
const FOOD_INDEX = {};
FOOD_DB.forEach(f => { FOOD_INDEX[f.n] = f.k; });
function findFoodMatch(query){
  if(!query || query.trim().length < 2) return null;
  const q = query.trim();
  if(FOOD_INDEX[q] !== undefined) return FOOD_INDEX[q];
  const hit = FOOD_DB.find(f => f.n.includes(q) || q.includes(f.n));
  return hit ? hit.k : null;
}
function findFoodSuggestions(query){
  if(!query || query.trim().length < 1) return [];
  const q = query.trim();
  return FOOD_DB.filter(f => f.n.includes(q)).slice(0, 6);
}
// Small curated subset shown as tap-to-add chips; FOOD_DB (full list) powers autocomplete/search
const QUICK_CHIPS = ['กะเพราหมูสับ+ไข่ดาว','ข้าวมันไก่','ส้มตำ','ต้มยำกุ้ง (ไม่มีข้าว)','ข้าวขาหมู','ผัดไทย',
  'แกงเขียวหวานไก่+ข้าว','ก๋วยเตี๋ยวต้มยำ','ข้าวเหนียวหมูปิ้ง','สลัดไก่ย่าง','กาแฟเย็นใส่นม','ชานมไข่มุก']
  .map(n => FOOD_DB.find(f=>f.n===n));

const EXERCISE_PRESETS = [
  {n:'เดินเร็ว', met:4.3},
  {n:'วิ่ง (ปานกลาง)', met:9.8},
  {n:'ปั่นจักรยาน', met:7.5},
  {n:'เวทเทรนนิ่ง', met:5.0},
  {n:'โยคะ', met:3.0},
  {n:'ว่ายน้ำ', met:6.0},
  {n:'มวยไทย/ชกมวย', met:8.0},
  {n:'HIIT', met:8.0},
  {n:'แบดมินตัน', met:5.5},
];

const STORE_PREFIX = 'wlt_';

async function safeGet(key){
  try{
    const raw = localStorage.getItem(STORE_PREFIX + key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){
    console.error('localStorage get failed', key, e);
    return null;
  }
}

async function safeSet(key, val){
  try{
    localStorage.setItem(STORE_PREFIX + key, JSON.stringify(val));
    return true;
  }catch(e){
    console.error('localStorage set failed', key, e);
    showStorageWarning();
    return false;
  }
}

function showStorageWarning(){
  if(document.getElementById('storage-warn')) return;
  const w = document.createElement('div');
  w.id = 'storage-warn';
  w.className = 'warn';
  w.style.margin = '0 0 12px';
  w.innerHTML = 'บันทึกข้อมูลไม่สำเร็จ — พื้นที่เก็บข้อมูลของเบราว์เซอร์อาจเต็มหรือถูกปิดกั้น (เช่น โหมดส่วนตัว)';
  const wrap = document.getElementById('app');
  if(wrap.firstChild) wrap.insertBefore(w, wrap.firstChild);
}

function calcBMR(p, weight=p.weight){
  const base = 10*weight + 6.25*p.height - 5*p.age;
  return p.gender==='male' ? base+5 : base-161;
}
const ACTIVITY_MULT = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725, veryactive:1.9};
function calcTDEE(p, weight=p.weight){ return calcBMR(p, weight) * ACTIVITY_MULT[p.activity]; }
function calcTarget(p, weight=p.weight){
  const tdee = calcTDEE(p, weight);
  const dailyDeficit = (p.pace * 7700) / 7;
  let target = tdee - dailyDeficit;
  const floor = p.gender==='male' ? 1500 : 1200;
  const clamped = Math.max(target, floor);
  return {target: Math.round(clamped), tdee: Math.round(tdee), clampedDown: target < floor};
}
function bmi(p, weight=p.weight){ return weight / ((p.height/100)**2); }
function bmiLabel(v){
  if(v<18.5) return 'ต่ำกว่าเกณฑ์';
  if(v<23) return 'ปกติ';
  if(v<25) return 'ท้วม';
  if(v<30) return 'อ้วนระดับ 1';
  return 'อ้วนระดับ 2';
}

async function loadAll(){
  profile = await safeGet('profile');
  const d = await safeGet('day:'+viewDate);
  dayData = d || {food:[], exercise:[]};
  weightLog = (await safeGet('weightlog')) || [];
  render();
}

function render(){
  const app = document.getElementById('app');
  if(!profile){ app.innerHTML = onboardHTML(); attachOnboard(); return; }
  app.innerHTML = dashboardHTML();
  attachDashboard();
}

  </div>`;
}

function attachOnboard(){
  document.getElementById('ob-submit').onclick = async () => {
    const p = {
      age: +document.getElementById('ob-age').value || 22,
      gender: document.getElementById('ob-gender').value,
      height: +document.getElementById('ob-height').value,
      weight: +document.getElementById('ob-weight').value,
      goal: +document.getElementById('ob-goal').value,
      activity: document.getElementById('ob-activity').value,
      pace: +document.getElementById('ob-pace').value,
    };
    if(!p.height || !p.weight || !p.goal){
      document.getElementById('ob-warn').innerHTML = `<div class="warn">กรุณากรอกส่วนสูง น้ำหนักปัจจุบัน และน้ำหนักเป้าหมายให้ครบ</div>`;
      return;
    }
    profile = p;
    await safeSet('profile', p);
    weightLog = [{date: today, weight: p.weight}];
    await safeSet('weightlog', weightLog);
    render();
  };
}

function weightChartSVG(){
  if(weightLog.length < 2){
    return `<div class="empty">บันทึกน้ำหนักอย่างน้อย 2 ครั้งเพื่อดูกราฟแนวโน้ม</div>`;
  }
  const sorted = [...weightLog].sort((a,b)=>a.date.localeCompare(b.date)).slice(-30);
  const w=600, h=140, pad=10;
  const weights = sorted.map(d=>d.weight);
  const min = Math.min(...weights, profile.goal) - 1;
  const max = Math.max(...weights, profile.weight) + 1;
  const xStep = (w - pad*2) / (sorted.length - 1);
  const yScale = v => h - pad - ((v - min)/(max-min)) * (h - pad*2);
  const points = sorted.map((d,i) => `${pad + i*xStep},${yScale(d.weight)}`).join(' ');
  const goalY = yScale(profile.goal);
  return `
  <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${goalY}" x2="${w-pad}" y2="${goalY}" stroke="#4FB8A8" stroke-dasharray="4 4" stroke-width="1"/>
    <polyline points="${points}" fill="none" stroke="#E3B341" stroke-width="2.5"/>
    ${sorted.map((d,i)=>`<circle cx="${pad+i*xStep}" cy="${yScale(d.weight)}" r="3" fill="#E3B341"/>`).join('')}
  </svg>
  <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:4px;">
    <span>${sorted[0].weight} กก.</span><span style="color:#4FB8A8">เป้าหมาย ${profile.goal} กก.</span><span>${sorted[sorted.length-1].weight} กก.</span>
  </div>`;
}

function dashboardHTML(){
  const currentW = weightLog.length ? weightLog[weightLog.length-1].weight : profile.weight;
  const startW = weightLog.length ? weightLog[0].weight : profile.weight;
  const t = calcTarget(profile, currentW);
  const bmr = Math.round(calcBMR(profile, currentW));
  const b = bmi(profile, currentW);
  const foodTotal = dayData.food.reduce((s,f)=>s+f.kcal,0);
  const proteinTotal = dayData.food.reduce((s,f)=>s+(f.protein||0),0);
  const proteinTarget = Math.round(currentW * 1.8);
  const exTotal = dayData.exercise.reduce((s,e)=>s+e.kcal,0);
  const remaining = t.target - foodTotal + exTotal;
  const toLose = currentW - profile.goal;
  const weeksLeft = profile.pace > 0 ? Math.max(0, Math.ceil(toLose / profile.pace)) : 0;

  // Progress toward goal: % of the way from starting weight to goal weight
  const totalToLose = startW - profile.goal;
  let progressPct = 0;
  if(totalToLose > 0){
    progressPct = Math.round(((startW - currentW) / totalToLose) * 100);
  } else if(totalToLose < 0){ // goal is to gain weight
    progressPct = Math.round(((currentW - startW) / -totalToLose) * 100);
  }
  progressPct = Math.max(0, Math.min(100, progressPct));

  const foodRows = dayData.food.length ? dayData.food.map((f,i)=>`
    <div class="entry-row">
      <div><div class="entry-name">${f.name}</div>${f.protein ? `<div class="entry-meta">โปรตีน ${f.protein} g</div>` : ''}</div>
      <div class="entry-right"><span class="entry-kcal">${f.kcal} kcal</span>
        <button class="del-btn" onclick="delFood(${i})">✕</button></div>
    </div>`).join('') : `<div class="empty">ยังไม่มีรายการอาหารวันนี้</div>`;

  const exRows = dayData.exercise.length ? dayData.exercise.map((e,i)=>`
    <div class="entry-row">
      <div><div class="entry-name">${e.name}</div><div class="entry-meta">${e.duration} นาที</div></div>
      <div class="entry-right"><span class="entry-kcal pos">-${e.kcal} kcal</span>
        <button class="del-btn" onclick="delExercise(${i})">✕</button></div>
    </div>`).join('') : `<div class="empty">ยังไม่มีรายการออกกำลังกายวันนี้</div>`;

  return `
  <div class="ticker">
    <div class="ticker-label">Daily Ledger — ${fmtDate(viewDate)}</div>
    <div class="ticker-row">
      <div><span class="ticker-balance ${remaining>=0?'pos':'neg'}">${remaining>=0?'+':''}${remaining}</span><span class="ticker-unit">kcal เหลือ</span></div>
    </div>
    <div class="ticker-sub">
      <span>เป้าหมาย <b>${t.target}</b></span>
      <span>กินแล้ว <b class="neg">${foodTotal}</b></span>
      <span>เผาผลาญ <b class="pos">${exTotal}</b></span>
    </div>
    ${t.clampedDown ? `<div class="warn" style="margin-top:10px;">ค่าที่คำนวณได้ต่ำกว่าเกณฑ์ปลอดภัย ระบบปรับเป็น ${t.target} kcal/วัน แทน</div>` : ''}
  </div>

  <h2><span class="idx">01</span> ค่าสุขภาพ</h2>
  <div class="metrics-grid">
    <div class="metric"><div class="lbl">BMI</div><div class="val">${b.toFixed(1)}</div><div class="sub">${bmiLabel(b)}</div></div>
    <div class="metric"><div class="lbl">BMR</div><div class="val">${bmr}</div><div class="sub">kcal/วัน (พักนิ่ง)</div></div>
    <div class="metric"><div class="lbl">TDEE</div><div class="val">${t.tdee}</div><div class="sub">kcal/วัน (รวมกิจกรรม)</div></div>
    <div class="metric"><div class="lbl">เหลืออีก</div><div class="val">${weeksLeft}</div><div class="sub">สัปดาห์ถึงเป้าหมาย</div></div>
    <div class="metric" style="grid-column:1/-1;">
      <div class="lbl">โปรตีน</div>
      <div class="val">${proteinTotal}<span style="font-size:14px; color:var(--text-dim); font-weight:500;"> / ${proteinTarget} g</span></div>
      <div class="progress-track" style="margin-top:8px;"><div class="progress-fill" style="width:${Math.min(100, Math.round(proteinTotal/proteinTarget*100))}%; background:linear-gradient(90deg, var(--credit), #7FE0D0);"></div></div>
      <div class="sub" style="margin-top:6px;">เป้าหมาย 1.8 g/กก. (ช่วงแนะนำ 1.6-2.2 g/กก. ระหว่างลดน้ำหนัก เพื่อรักษามวลกล้ามเนื้อ)</div>
    </div>
  </div>

  <h2><span class="idx">02</span> แนวโน้มน้ำหนัก</h2>
  <div class="chart-wrap">
    <div class="progress-wrap">
      <div class="progress-label">
        <span>ความคืบหน้าสู่เป้าหมาย</span>
        <span class="progress-pct">${progressPct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${progressPct}%"></div>
      </div>
      <div class="progress-sub">${startW} กก. → ${profile.goal} กก. (ตอนนี้ ${currentW} กก.)</div>
    </div>
    ${weightChartSVG()}
    <form class="inline" id="weight-form">
      <input id="weight-input" type="number" step="0.1" placeholder="น้ำหนักวันนี้ (กก.) — ปัจจุบัน ${currentW}">
      <button class="btn" type="submit">บันทึก</button>
    </form>
  </div>

  <h2><span class="idx">03</span> รายการอาหาร</h2>
  <div class="card">
    ${foodRows}
    <div class="preset-row">
      ${QUICK_CHIPS.map(f=>`<span class="chip" onclick="quickFood('${f.n.replace(/'/g,"\\'")}',${f.k})">${f.n} · ${f.k}</span>`).join('')}
    </div>
    <form class="inline" id="food-form" autocomplete="off">
      <input id="food-name" placeholder="ชื่อเมนู (พิมพ์แล้วจะหาแคลให้อัตโนมัติ)" required>
      <input id="food-kcal" type="number" placeholder="kcal" style="max-width:90px" required>
      <input id="food-protein" type="number" placeholder="โปรตีน g (ไม่บังคับ)" style="max-width:130px">
      <button class="btn" type="submit">เพิ่ม</button>
    </form>
    <div id="food-suggestions"></div>
    <div id="food-not-found"></div>
  </div>

  <h2><span class="idx">04</span> การออกกำลังกาย</h2>
  <div class="card">
    ${exRows}
    <form class="inline" id="exercise-form">
      <select id="ex-preset" style="flex:1.5">
        ${EXERCISE_PRESETS.map(e=>`<option value="${e.met}" data-name="${e.n}">${e.n}</option>`).join('')}
      </select>
      <input id="ex-duration" type="number" placeholder="นาที" style="max-width:80px" value="30">
      <button class="btn" type="submit">เพิ่ม</button>
    </form>
  </div>

  <div class="date-nav">
    <button onclick="changeDay(-1)">← วันก่อน</button>
    <span class="curr">${viewDate===today ? 'วันนี้' : fmtDate(viewDate)}</span>
    <button onclick="changeDay(1)" ${viewDate>=today?'disabled style="opacity:.3"':''}>วันถัดไป →</button>
  </div>

  <footer class="reset"><button onclick="resetProfile()">รีเซ็ตข้อมูลโปรไฟล์ทั้งหมด</button></footer>
  `;
}

async function saveDay(){ await safeSet('day:'+viewDate, dayData); }

window.quickFood = (name, kcal) => addFood(name, kcal);
window.delFood = async (i) => { dayData.food.splice(i,1); await saveDay(); render(); };
window.delExercise = async (i) => { dayData.exercise.splice(i,1); await saveDay(); render(); };
window.changeDay = async (delta) => {
  const d = new Date(viewDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  viewDate = dateStr(d);
  const dd = await safeGet('day:'+viewDate);
  dayData = dd || {food:[], exercise:[]};
  render();
};
window.resetProfile = async () => {
  if(!confirm('ลบข้อมูลโปรไฟล์และเริ่มใหม่ทั้งหมด?')) return;
  profile = null;
  await safeSet('profile', null);
  render();
};

async function addFood(name, kcal, protein=0){
  dayData.food.push({name, kcal: Math.round(kcal), protein: Math.round(protein) || 0});
  await saveDay();
  render();
}

function attachDashboard(){
  const foodNameInput = document.getElementById('food-name');
  const foodKcalInput = document.getElementById('food-kcal');
  const suggestBox = document.getElementById('food-suggestions');
  const notFoundBox = document.getElementById('food-not-found');
  let kcalAutoFilled = false; // tracks whether we filled kcal automatically, so we don't fight the user's manual edits

  function renderSuggestions(){
    const q = foodNameInput.value.trim();
    notFoundBox.innerHTML = '';
    if(q.length < 1){ suggestBox.innerHTML = ''; return; }
    const matches = findFoodSuggestions(q);
    if(matches.length){
      suggestBox.innerHTML = matches.map(f =>
        `<span class="suggest-chip" onclick="selectFoodSuggestion('${f.n.replace(/'/g,"\\'")}',${f.k})">${f.n} <b>${f.k}</b></span>`
      ).join('');
    } else {
      suggestBox.innerHTML = '';
      if(q.length >= 2){
        const url = 'https://www.google.com/search?q=' + encodeURIComponent(q + ' แคลอรี่ kcal');
        notFoundBox.innerHTML = `<div class="not-found-box"><span>ไม่พบในฐานข้อมูล ลองหาข้างนอกไหม?</span><a class="search-link" href="${url}" target="_blank" rel="noopener">ค้นหา →</a></div>`;
      }
    }
  }

  foodNameInput.oninput = () => {
    kcalAutoFilled = false;
    renderSuggestions();
    // auto-fill on a confident exact/near match while typing, without overwriting a manual kcal value
    const match = findFoodMatch(foodNameInput.value);
    if(match !== null && (foodKcalInput.value === '' || kcalAutoFilled)){
      foodKcalInput.value = match;
      kcalAutoFilled = true;
    }
  };

  window.selectFoodSuggestion = (name, kcal) => {
    foodNameInput.value = name;
    foodKcalInput.value = kcal;
    kcalAutoFilled = true;
    suggestBox.innerHTML = '';
    notFoundBox.innerHTML = '';
  };

  document.getElementById('food-form').onsubmit = async (e) => {
    e.preventDefault();
    const name = foodNameInput.value.trim();
    const kcal = +foodKcalInput.value;
    const protein = +document.getElementById('food-protein').value || 0;
    if(!name || !kcal) return;
    await addFood(name, kcal, protein);
  };
  document.getElementById('exercise-form').onsubmit = async (e) => {
    e.preventDefault();
    const sel = document.getElementById('ex-preset');
    const met = +sel.value;
    const name = sel.options[sel.selectedIndex].dataset.name;
    const duration = +document.getElementById('ex-duration').value || 30;
    const currentW = weightLog.length ? weightLog[weightLog.length-1].weight : profile.weight;
    const kcal = Math.round(met * currentW * (duration/60));
    dayData.exercise.push({name, duration, kcal});
    await saveDay();
    render();
  };
  document.getElementById('weight-form').onsubmit = async (e) => {
    e.preventDefault();
    const val = +document.getElementById('weight-input').value;
    if(!val) return;
    const existingIdx = weightLog.findIndex(w=>w.date===viewDate);
    if(existingIdx >= 0) weightLog[existingIdx].weight = val;
    else weightLog.push({date: viewDate, weight: val});
    await safeSet('weightlog', weightLog);
    render();
  };
}

loadAll();
</script>
</body>
</html>
